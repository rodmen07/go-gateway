name: CI

on:
  push:
    branches-ignore: [main]
    paths:
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
  workflow_dispatch:

jobs:
  ci:
    name: vet, build and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test with coverage
        run: go test -race -count=1 -coverprofile=coverage.out -covermode=atomic ./...

      - name: Vulnerability scan (govulncheck)
        # Informational: govulncheck reports reachable advisories plus Go stdlib
        # advisories that track the toolchain patch level, so it stays
        # non-blocking to avoid failing unrelated PRs when upstream publishes a
        # new advisory. Findings are visible in the job log for triage.
        continue-on-error: true
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          flags: go-gateway
          name: go-gateway-coverage
          fail_ci_if_error: false
