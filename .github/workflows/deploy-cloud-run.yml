name: Deploy — Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - ".github/workflows/deploy-cloud-run.yml"
      - ".github/actions/cloud-run-rollback/action.yml"
      - "scripts/smoke-test.sh"
  workflow_dispatch:

env:
  GCP_REGION: us-central1
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  SERVICE_NAME: go-gateway
  IMAGE_NAME: go-gateway
  CACHE_TTL_SECONDS: ${{ vars.GATEWAY_CACHE_TTL_SECONDS }}
  CACHE_MAX_ENTRIES: ${{ vars.GATEWAY_CACHE_MAX_ENTRIES }}

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for OIDC token exchange with GCP WIF

    steps:
      - uses: actions/checkout@v4

      - name: Validate deploy configuration
        id: config
        run: |
          if [ -z "${{ env.GCP_PROJECT_ID }}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping deploy: GCP_PROJECT_ID variable is not set."
            exit 0
          fi
          if [ -z "${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping deploy: GCP_WORKLOAD_IDENTITY_PROVIDER secret is not set."
            exit 0
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Authenticate to Google Cloud
        if: steps.config.outputs.enabled == 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        if: steps.config.outputs.enabled == 'true'
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        if: steps.config.outputs.enabled == 'true'
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        if: steps.config.outputs.enabled == 'true'
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/microservices/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Resolve upstream service URLs
        if: steps.config.outputs.enabled == 'true'
        run: |
          # Query each Cloud Run service URL; fall back to empty string if not yet deployed
          get_url() {
            gcloud run services describe "$1" \
              --region="${{ env.GCP_REGION }}" \
              --format='value(status.url)' 2>/dev/null || echo ""
          }
          echo "TASKS_URL=$(get_url backend-service)" >> "$GITHUB_ENV"
          echo "ACCOUNTS_URL=$(get_url accounts-service)" >> "$GITHUB_ENV"
          echo "CONTACTS_URL=$(get_url contacts-service)" >> "$GITHUB_ENV"
          echo "OPPORTUNITIES_URL=$(get_url opportunities-service)" >> "$GITHUB_ENV"
          echo "ACTIVITIES_URL=$(get_url activities-service)" >> "$GITHUB_ENV"
          echo "AUTOMATION_URL=$(get_url automation-service)" >> "$GITHUB_ENV"
          echo "INTEGRATIONS_URL=$(get_url integrations-service)" >> "$GITHUB_ENV"
          echo "REPORTING_URL=$(get_url reporting-service)" >> "$GITHUB_ENV"
          echo "SEARCH_URL=$(get_url search-service)" >> "$GITHUB_ENV"
          echo "EVENTS_URL=$(get_url observaboard)" >> "$GITHUB_ENV"
          echo "OBSERVABOARD_URL=$(get_url observaboard)" >> "$GITHUB_ENV"

      - name: Record current stable revision
        id: stable
        if: steps.config.outputs.enabled == 'true'
        run: |
          STABLE=$(gcloud run services describe "${{ env.SERVICE_NAME }}" \
            --region="${{ env.GCP_REGION }}" \
            --format='value(status.traffic[0].revisionName)' 2>/dev/null || echo "")
          echo "revision=${STABLE}" >> "$GITHUB_OUTPUT"
          echo "Stable revision: ${STABLE}"

      - name: Deploy to Cloud Run (no-traffic canary)
        id: deploy
        if: steps.config.outputs.enabled == 'true'
        run: |
          # Build env var string from resolved upstream URLs (skip empty values)
          # Note: PORT is reserved by Cloud Run and injected automatically (value: 8080)
          ENV_VARS=""
          append_if_set() {
            if [ -n "$2" ]; then
              if [ -z "$ENV_VARS" ]; then
                ENV_VARS="$1=$2"
              else
                ENV_VARS="${ENV_VARS},$1=$2"
              fi
            fi
          }
          append_if_set TASKS_URL         "$TASKS_URL"
          append_if_set ACCOUNTS_URL      "$ACCOUNTS_URL"
          append_if_set CONTACTS_URL      "$CONTACTS_URL"
          append_if_set OPPORTUNITIES_URL "$OPPORTUNITIES_URL"
          append_if_set ACTIVITIES_URL    "$ACTIVITIES_URL"
          append_if_set AUTOMATION_URL    "$AUTOMATION_URL"
          append_if_set INTEGRATIONS_URL  "$INTEGRATIONS_URL"
          append_if_set REPORTING_URL     "$REPORTING_URL"
          append_if_set SEARCH_URL        "$SEARCH_URL"
          append_if_set EVENTS_URL        "$EVENTS_URL"
          append_if_set OBSERVABOARD_URL  "$OBSERVABOARD_URL"
          append_if_set REDIS_URL         "${{ secrets.GO_GATEWAY_REDIS_URL }}"
          append_if_set CACHE_TTL_SECONDS "${{ env.CACHE_TTL_SECONDS }}"
          append_if_set CACHE_MAX_ENTRIES "${{ env.CACHE_MAX_ENTRIES }}"

          # Deploy with --no-traffic so the new revision is reachable via its
          # direct URL for smoke testing but serves 0% of production traffic.
          gcloud run deploy "${{ env.SERVICE_NAME }}" \
            --image "$IMAGE" \
            --region "${{ env.GCP_REGION }}" \
            --platform managed \
            --port 8080 \
            --memory 256Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --concurrency 80 \
            --execution-environment gen2 \
            --service-account "${{ secrets.GCP_SERVICE_ACCOUNT }}" \
            ${ENV_VARS:+--set-env-vars "${ENV_VARS}"} \
            --set-secrets OBSERVABOARD_API_KEY=OBSERVABOARD_API_KEY:latest,AUTH_JWT_SECRET=AUTH_JWT_SECRET:latest \
            --no-traffic \
            --quiet

          # Capture the name of the revision that was just created.
          NEW_REV=$(gcloud run services describe "${{ env.SERVICE_NAME }}" \
            --region="${{ env.GCP_REGION }}" \
            --format='value(status.latestCreatedRevisionName)')
          echo "new_revision=${NEW_REV}" >> "$GITHUB_OUTPUT"
          echo "New revision: ${NEW_REV}"

      - name: Allow unauthenticated access
        if: steps.config.outputs.enabled == 'true'
        run: |
          for attempt in 1 2 3 4 5; do
            if gcloud run services add-iam-policy-binding "${{ env.SERVICE_NAME }}" \
              --region "${{ env.GCP_REGION }}" \
              --member="allUsers" \
              --role="roles/run.invoker"; then
              break
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "::error::IAM binding failed after 5 attempts."
              exit 1
            fi
            sleep $((2 ** attempt))
          done

      - name: Smoke test new revision (0% traffic)
        id: smoke_zero
        if: steps.config.outputs.enabled == 'true'
        run: |
          # The new revision exposes a direct URL of the form:
          #   https://<revision>---<hash>-<region>.a.run.app
          # Use the service URL for health (revision URL requires auth); we probe
          # the stable URL to confirm the running service is still healthy while
          # the new revision is warming up.
          SERVICE_URL=$(gcloud run services describe "${{ env.SERVICE_NAME }}" \
            --region="${{ env.GCP_REGION }}" \
            --format='value(status.url)')
          bash scripts/smoke-test.sh "$SERVICE_URL"

      - name: Shift 10% traffic to canary
        if: steps.config.outputs.enabled == 'true' && steps.stable.outputs.revision != ''
        run: |
          gcloud run services update-traffic "${{ env.SERVICE_NAME }}" \
            --region="${{ env.GCP_REGION }}" \
            --to-revisions="${{ steps.deploy.outputs.new_revision }}=10,${{ steps.stable.outputs.revision }}=90" \
            --quiet
          echo "Traffic: 10% -> ${{ steps.deploy.outputs.new_revision }}, 90% -> ${{ steps.stable.outputs.revision }}"

      - name: Canary soak (30 s)
        if: steps.config.outputs.enabled == 'true' && steps.stable.outputs.revision != ''
        run: sleep 30

      - name: Smoke test at 10% canary
        id: smoke_canary
        if: steps.config.outputs.enabled == 'true' && steps.stable.outputs.revision != ''
        run: |
          SERVICE_URL=$(gcloud run services describe "${{ env.SERVICE_NAME }}" \
            --region="${{ env.GCP_REGION }}" \
            --format='value(status.url)')
          bash scripts/smoke-test.sh "$SERVICE_URL"

      - name: Shift 100% traffic to new revision
        if: steps.config.outputs.enabled == 'true'
        run: |
          gcloud run services update-traffic "${{ env.SERVICE_NAME }}" \
            --region="${{ env.GCP_REGION }}" \
            --to-latest \
            --quiet
          echo "Traffic: 100% -> ${{ steps.deploy.outputs.new_revision }}"

      - name: Final health check
        if: steps.config.outputs.enabled == 'true'
        run: |
          URL=$(gcloud run services describe "${{ env.SERVICE_NAME }}" \
            --region "${{ env.GCP_REGION }}" \
            --format='value(status.url)')
          echo "Gateway URL: $URL"
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${URL}/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed."
              exit 0
            fi
            echo "Attempt $i: got $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "::error::Health check failed after 2 minutes."
          exit 1

      - name: Rollback on smoke failure
        if: >
          steps.config.outputs.enabled == 'true' &&
          steps.stable.outputs.revision != '' &&
          (failure() && (steps.smoke_zero.outcome == 'failure' || steps.smoke_canary.outcome == 'failure'))
        uses: ./.github/actions/cloud-run-rollback
        with:
          service_name: ${{ env.SERVICE_NAME }}
          region: ${{ env.GCP_REGION }}
          stable_revision: ${{ steps.stable.outputs.revision }}
          new_revision: ${{ steps.deploy.outputs.new_revision }}
